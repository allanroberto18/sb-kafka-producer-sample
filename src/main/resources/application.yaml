spring:
  application:
    name: sb-kafka-producer-sample

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/orders_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  flyway:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/orders_db}
    user: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    enabled: true
    locations:
      - classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  kafka:
    order-topic: ${KAFKA_ORDER_TOPIC:orders.created}
  outbox:
    batch-size: ${OUTBOX_BATCH_SIZE:20}
    fixed-delay-ms: ${OUTBOX_FIXED_DELAY_MS:3000}
